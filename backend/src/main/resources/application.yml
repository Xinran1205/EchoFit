server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: training-echo-backend
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  profiles:
    active: local
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 5s
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          ssl:
            enable: true
          starttls:
            enable: false
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 60MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  jwt:
    secret: ${JWT_SECRET:please-change-this-secret-at-least-32-bytes}
    expire-hours: ${JWT_EXPIRE_HOURS:720}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,http://[::1]:*}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:}
  auth:
    verification-code:
      expire-minutes: ${AUTH_CODE_EXPIRE_MINUTES:10}
      resend-seconds: ${AUTH_CODE_RESEND_SECONDS:60}
  reminder:
    default-enabled: true
    daily-hour: 20
    daily-minute: 0
  storage:
    training-photo-root: ${TRAINING_PHOTO_STORAGE_ROOT:./data/uploads/training-photos}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    mail:
      enabled: false
