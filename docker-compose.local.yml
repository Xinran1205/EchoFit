services:
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.4.9
    container_name: echofit-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-training_echo}
      MYSQL_USER: ${MYSQL_USER:-training}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-training123}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot123456 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: docker.m.daocloud.io/library/redis:7.4.2-alpine
    container_name: echofit-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: echofit-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./deploy/local.env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_USER: ${MYSQL_USER:-training}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-training123}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret-at-least-32-bytes}
      CORS_ALLOWED_ORIGINS: http://localhost:*,http://127.0.0.1:*,http://[::1]:*
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./data/uploads:/app/data/uploads
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_DISABLE_PWA: "true"
    container_name: echofit-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  mysql_data:
  redis_data:
